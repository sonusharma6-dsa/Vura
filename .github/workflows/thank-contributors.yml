name: Thank Contributors

on:
  pull_request:
    types: [closed]

jobs:
  thank-contributor:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.user.login != 'omn7'
    
    steps:
      - name: Thank contributor
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            
            // Don't comment if the PR was created by omn7
            if (author === 'omn7') {
              console.log('Skipping comment for PR created by omn7');
              return;
            }
            
            const commentBody = `Thank you so much for contributing to Vura! 🙏 Your efforts are greatly appreciated and help make this project better.

If you'd like to download your contribution certificate and view your profile, please visit:
https://vurakit.vercel.app/contributor

We're grateful for your support!`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
